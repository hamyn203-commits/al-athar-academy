name: Health Check (Production)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  probe:
    name: API + Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Backend health
        run: |
          body=$(curl -sf https://al-athar-api.azurewebsites.net/api/health)
          echo "$body"
          echo "$body" | grep -q '"status":"ok"'

      - name: Frontend home
        run: curl -sf -o /dev/null -w "HTTP %{http_code}\n" https://al-athar-academy.vercel.app/ar/

      - name: Frontend app page
        run: curl -sf -o /dev/null -w "HTTP %{http_code}\n" https://al-athar-academy.vercel.app/ar/app

      - name: API teachers
        run: curl -sf https://al-athar-api.azurewebsites.net/api/teachers?limit=1 | grep -q '"teachers"'

      - run: echo "### All production checks passed ✅" >> "$GITHUB_STEP_SUMMARY"
